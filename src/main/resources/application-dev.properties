#================================
# ==== EFS-Local-File ===========
# ===============================
storage.efsFileDire=${EFS_FILE_DIRE}
# ===============================
# = DATA SOURCE
# ===============================
# Set here configurations for the database connection
spring.jackson.serialization.fail-on-empty-beans=false
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# Keep the connection alive if idle for a long time (needed in production)
spring.jpa.show-sql=true
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1
# ===============================
# = JPA / HIBERNATE
# ===============================
# Show or not log for each sql query
#spring.jpa.show-sql=true
spring.jpa.hibernate.naming-strategy=org.hibernate.cfg.ImprovedNamingStrategy
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update
# Do not defer datasource initialization when using Liquibase; deferring can
# create a circular depends-on between Liquibase and the EntityManagerFactory.
spring.jpa.defer-datasource-initialization=false

# Liquibase is enabled in all profiles; changelogs are applied at startup.
# In development you may still use Hibernate ddl-auto for rapid iteration,
# but Liquibase will run as well to keep schema changes tracked.
# ===============================
# = Kafka Configuration
# ===============================
tpd.test-topic=${TOPIC_TEST}
tpd.truck-topic=${TOPIC_TRUCK}
tpd.scrapping-topic=${TOPIC_SCRAP}
#===============================
# ==== Email detail ============
# ==============================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
#===============================
# ==== Socket detail ===========
# ==============================
socket.session.id=${SOCKET_SESSION_ID}
socket.transaction.id=${SOCKET_TRANSACTION_ID}
# ===============================
# = Liquibase  ==================
# ===============================
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml