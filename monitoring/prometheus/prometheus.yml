global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'etl-process-monitor'

rule_files:
  - '/etc/prometheus/rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'spring-boot-app'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['process_app:9098']
    scrape_interval: 10s
    scrape_timeout: 5s
